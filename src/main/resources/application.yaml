server:
  port: 8080

spring:
  application:
    name: distributed-rate-limiter

  data:
    redis:
      host: localhost
      port: 6379
      # password:           # uncomment when Redis AUTH is enabled (Day 6)
      timeout: 2000ms       # command timeout — fail fast, don't block threads
      lettuce:
        pool:
          max-active: 16    # max concurrent connections
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms  # how long to wait for a connection from the pool

  # ── MySQL (Admin API persistent rule store) ──────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/rate_limiter?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ratelimiter
    password: ratelimiter
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000   # ms — fail fast, don't stall request threads
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true     # safe for existing DBs that predate Flyway

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always  # exposes Redis connectivity status at /actuator/health

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.ratelimiter.distributed: DEBUG   # verbose for our own code during development

# ── Rate-limiter rules (loaded by RuleRegistryProperties / InMemoryRuleRegistry) ──
# Add or remove entries here without touching application code.
# Fields: tenantId, endpoint, maxRequests, windowSizeSeconds, algorithm (SLIDING_WINDOW | TOKEN_BUCKET)
rate-limiter:
  rules:
    # ── tesco-orders ──────────────────────────────────────────────────────────
    - tenantId: tesco-orders
      endpoint: /api/orders
      maxRequests: 50
      windowSizeSeconds: 60
      algorithm: SLIDING_WINDOW

    - tenantId: tesco-orders
      endpoint: /api/search
      maxRequests: 200
      windowSizeSeconds: 60
      algorithm: TOKEN_BUCKET

    # ── acme-payments ─────────────────────────────────────────────────────────
    - tenantId: acme-payments
      endpoint: /api/payments
      maxRequests: 100
      windowSizeSeconds: 60
      algorithm: SLIDING_WINDOW

    - tenantId: acme-payments
      endpoint: /api/refunds
      maxRequests: 10
      windowSizeSeconds: 60
      algorithm: SLIDING_WINDOW

# ── Admin API ──────────────────────────────────────────────────────────────────
# Override in production via environment variable: ADMIN_API_KEY=<secret>
# Never commit a real secret to version control.
admin:
  api-key: ${ADMIN_API_KEY:dev-only-insecure-key-change-in-prod}
