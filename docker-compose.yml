# ─────────────────────────────────────────────────────────────────────────────
# Distributed Rate Limiter — Local Development Stack
#
# Usage:
#   Start:   docker compose up -d
#   Stop:    docker compose down
#   Logs:    docker compose logs -f redis
#   CLI:     docker compose exec redis redis-cli
# ─────────────────────────────────────────────────────────────────────────────

services:

  redis:
    image: redis:7.2-alpine          # slim, production-close image
    container_name: rate-limiter-redis
    restart: unless-stopped
    ports:
      - "6379:6379"                  # exposed to localhost so the Spring Boot app can connect
    volumes:
      - redis_data:/data             # persist data across container restarts
    # allkeys-lru: evict least-recently-used keys when memory is full.
    # Rate limiter keys are naturally time-bound, so LRU is the correct eviction policy.
    command: >
      redis-server
      --save 60 1
      --loglevel notice
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: rate-limiter-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rate_limiter
      MYSQL_USER: ratelimiter
      MYSQL_PASSWORD: ratelimiter
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+00:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ratelimiter", "-pratelimiter"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  redis_data:
    driver: local
  mysql_data:
    driver: local
